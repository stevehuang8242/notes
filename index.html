<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Steve's Notes</title>
<!-- 在繪製前就決定主題，避免載入時閃一下錯誤配色 -->
<script>
(function(){
  try{
    var t = localStorage.getItem('theme');
    if(t !== 'light' && t !== 'dark')
      t = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', t);
  }catch(e){ document.documentElement.setAttribute('data-theme', 'dark'); }
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  color-scheme:dark;
  --bg:#000; --ink:#fff; --ink2:#b9b9bd; --ink3:#7c7c82;
  --line:rgba(255,255,255,.16); --hair:rgba(255,255,255,.10);
  --panel:rgba(255,255,255,.035); --panel2:rgba(255,255,255,.06);
  --accent:#9db7d8; /* restrained cold steel — 沿用兩篇的主色 */
  --nav-bg:rgba(0,0,0,.55); --nav-bg2:rgba(0,0,0,.78);
  --mark:rgba(157,183,216,.28);
  --sf:"Saira","PingFang TC","Helvetica Neue","Microsoft JhengHei",sans-serif;
}
[data-theme="light"]{
  color-scheme:light;
  --bg:#f7f7f5; --ink:#16181d; --ink2:#4a4d55; --ink3:#85888f;
  --line:rgba(0,0,0,.15); --hair:rgba(0,0,0,.08);
  --panel:rgba(0,0,0,.04); --panel2:rgba(0,0,0,.06);
  --accent:#3f6597; /* darker steel for contrast on light */
  --nav-bg:rgba(247,247,245,.72); --nav-bg2:rgba(247,247,245,.88);
  --mark:rgba(63,101,151,.20);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:var(--sf);background:var(--bg);color:var(--ink);font-size:17px;line-height:1.6;font-weight:400;letter-spacing:.01em;-webkit-font-smoothing:antialiased;overflow-x:hidden;transition:background .35s ease,color .35s ease}
.wrap{max-width:1080px;margin:0 auto;padding:0 30px}
a{color:var(--ink);text-decoration:none}
.num{font-variant-numeric:tabular-nums;letter-spacing:.01em}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:54px;display:flex;align-items:center;background:var(--nav-bg);backdrop-filter:saturate(160%) blur(14px);-webkit-backdrop-filter:saturate(160%) blur(14px);border-bottom:1px solid transparent;transition:border-color .3s,background .3s}
nav.scrolled{border-bottom-color:var(--hair);background:var(--nav-bg2)}
nav .wrap{display:flex;align-items:center;justify-content:space-between;width:100%}
nav .brand{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.26em}
nav .links{display:flex;gap:30px}
nav .links a{font-size:11.5px;font-weight:500;text-transform:uppercase;letter-spacing:.2em;color:var(--ink2);transition:color .2s}
nav .links a:hover{color:var(--ink)}
.nav-right{display:flex;align-items:center;gap:14px}
/* shared round icon buttons (search + theme) */
.icon-btn{background:none;border:0;padding:0;cursor:pointer;color:var(--ink2);width:34px;height:34px;display:grid;place-items:center;border-radius:50%;flex:none;transition:color .2s,background .2s;-webkit-tap-highlight-color:transparent}
.icon-btn:hover{color:var(--ink);background:var(--panel)}
.icon-btn svg{width:17px;height:17px;display:block}
/* collapsible search: just an icon by default, a rounded field expands on click */
.nav-search{display:flex;align-items:center;gap:0;transition:gap .2s ease}
.nav-search.open{gap:6px}
.ns-input{width:0;min-width:0;opacity:0;padding:0;border:1px solid transparent;border-radius:19px;background:var(--panel);color:var(--ink);font-family:var(--sf);font-size:14px;font-weight:300;letter-spacing:.01em;outline:none;transition:width .28s ease,opacity .2s ease,padding .28s ease,border-color .2s ease,background .2s ease}
.ns-input::placeholder{color:var(--ink3)}
.nav-search.open .ns-input{width:clamp(150px,32vw,240px);opacity:1;padding:4px 16px;border-color:var(--line)}
.nav-search.open .ns-input:focus{border-color:var(--accent);background:var(--panel2)}
.theme-toggle .icon-moon{display:none}
[data-theme="light"] .theme-toggle .icon-sun{display:none}
[data-theme="light"] .theme-toggle .icon-moon{display:block}
@media(max-width:760px){nav .links{display:none}}
@media(max-width:560px){nav.searching .brand{display:none}}

/* no masthead — list leads; first section just clears the fixed nav */
#index{padding-top:96px;border-top:0}
.accent{color:var(--accent)}

/* SECTION */
section{padding:110px 0;border-top:1px solid var(--hair);position:relative}
.label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.28em;color:var(--ink3);display:flex;align-items:center;gap:16px;margin-bottom:46px}
.label .ln{height:1px;width:46px;background:var(--line)}
.label .count{margin-left:auto;color:var(--ink2);font-weight:500}
.list-head{display:flex;justify-content:space-between;align-items:center;gap:14px;margin:6px 0 14px;min-height:16px}
.list-head .search-status{margin-top:0}
.list-head .count{font-size:11.5px;font-weight:500;text-transform:uppercase;letter-spacing:.18em;color:var(--ink3)}
.list-label{font-size:11.5px;font-weight:500;text-transform:uppercase;letter-spacing:.18em;color:var(--ink3)}

/* INDEX LIST — 本頁的 signature */
.idx{border-top:1px solid var(--line)}
.ep{display:grid;grid-template-columns:72px 1fr;gap:0 24px;align-items:center;padding:34px 14px;border-bottom:1px solid var(--hair);position:relative}
.ep:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}
.ep-no{font-size:15px;font-weight:600;color:var(--ink3);font-variant-numeric:tabular-nums;letter-spacing:.06em;align-self:start;padding-top:5px;transition:color .25s}
.ep:hover .ep-no{color:var(--accent)}
.ep-meta{display:flex;align-items:center;gap:14px;margin-bottom:11px}
.ep-src{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.2em;color:var(--ink2);border:1px solid var(--line);border-radius:2px;padding:2px 9px}
.ep-date{font-size:12px;font-weight:400;color:var(--ink3);text-transform:uppercase;letter-spacing:.14em}
.ep-title{font-size:clamp(21px,2.8vw,27px);font-weight:600;line-height:1.22;letter-spacing:.01em;transition:color .25s}
.ep:hover .ep-title{color:var(--accent)}
.ep-dek{font-size:15.5px;font-weight:300;line-height:1.6;color:var(--ink2);margin-top:11px;max-width:680px}
.ep-people{font-size:12px;font-weight:400;text-transform:uppercase;letter-spacing:.12em;color:var(--ink3);margin-top:15px}
@media(max-width:680px){
  .ep{grid-template-columns:46px 1fr;gap:0 16px;padding:28px 6px}
}

/* SEARCH RESULTS */
.search-status{font-size:11.5px;font-weight:500;text-transform:uppercase;letter-spacing:.16em;color:var(--ink3);min-height:15px}
mark{background:var(--mark);color:var(--ink);border-radius:2px;padding:0 1px}
.ep-snip{font-size:13.5px;font-weight:300;line-height:1.65;color:var(--ink3);margin-top:13px;max-width:680px;border-left:2px solid var(--line);padding-left:13px}
.empty{padding:46px 6px;color:var(--ink3);font-size:15px;font-weight:300;letter-spacing:.01em}

/* ABOUT */
.about p{font-size:18px;font-weight:300;line-height:1.75;color:var(--ink2);max-width:720px}
.about p strong{color:var(--ink);font-weight:500}
.about p + p{margin-top:20px}

/* FOOTER */
footer{border-top:1px solid var(--line);padding:88px 0 70px;text-align:center}
footer .f-bio{font-size:clamp(14px,1.6vw,17px);font-weight:300;color:var(--ink2);max-width:560px;margin:0 auto;line-height:1.7;letter-spacing:.01em}
footer .f-quote{position:relative;margin:38px auto 0;padding-top:30px;font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.24em;color:var(--ink3);line-height:1.9}
footer .f-quote::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:24px;height:1px;background:var(--line)}
footer .f-cite{display:block;margin-top:9px;font-size:11px;font-weight:400;letter-spacing:.16em;color:var(--ink3);opacity:.66}

/* REVEAL */
.rev{opacity:0;transform:translateY(24px);transition:opacity .85s ease,transform .85s ease}
.rev.in{opacity:1;transform:none}
@media(prefers-reduced-motion:reduce){
  html{scroll-behavior:auto}
  .rev{opacity:1;transform:none;transition:none}
  .ep,.ep-no,.ep-title{transition:none}
}
@media(max-width:760px){section{padding:80px 0}#index{padding-top:80px}}
</style>
</head>
<body>

<!-- ============ NAV ============ -->
<nav id="nav"><div class="wrap">
  <a class="brand" href="index.html">Steve's Notes</a>
  <div class="nav-right">
    <div class="nav-search" id="navSearch">
      <input id="q" class="ns-input" type="search" placeholder="搜尋筆記…" autocomplete="off" spellcheck="false" aria-label="搜尋筆記">
      <button id="search-toggle" class="icon-btn" type="button" aria-label="搜尋" aria-expanded="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.6-3.6"/></svg>
      </button>
    </div>
    <button id="theme-toggle" class="icon-btn theme-toggle" type="button" aria-label="切換深色／淺色主題" title="切換深色／淺色主題">
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
    </button>
  </div>
</div></nav>

<!-- ============ INDEX ============ -->
<section id="index"><div class="wrap">
  <div class="list-head rev"><span class="list-label" id="listLabel">All</span><span class="search-status" id="status"></span><span class="count num" id="count"></span></div>
  <div class="idx" id="list"></div>
</div></section>

<!-- ============ FOOTER ============ -->
<footer><div class="wrap rev">
  <p class="f-bio">我聽過、讀過、覺得值得留下來的內容。<br>交給 <span class="accent">Claude</span> 濃縮成一眼讀完的單頁筆記。</p>
  <p class="f-quote">Stay hungry. Stay foolish.<span class="f-cite">Steve Jobs · Stanford 2005</span></p>
</div></footer>

<script>
/* ───────────────────────────────────────────────
   清單與搜尋索引由 build-index.js 自動產生，毋須手改：
     notes.json         — 每篇的列表中繼資料（取自各篇 <head> 的 note:* meta）
     search-index.json  — 每篇內文純文字（供全文搜尋，第一次搜尋時才載入）
   新增一篇 = 放一個含 note:* meta 標籤的 HTML 並 push；
   GitHub Action 會自動重建上面兩個檔。
─────────────────────────────────────────────── */

/* ───────────── elements ───────────── */
const listEl   = document.getElementById('list');
const countEl  = document.getElementById('count');
const statusEl = document.getElementById('status');
const listLabel = document.getElementById('listLabel');
const qEl      = document.getElementById('q');

/* ───────────── state ───────────── */
let episodes = [];               // list metadata, loaded from notes.json
let allDocs  = [];
let total    = 0;
let fullText = null, loadingPromise = null;

/* ───────────── helpers ───────────── */
const esc = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function makeRe(terms){
  const safe = terms.filter(Boolean).map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  return safe.length ? new RegExp('(' + safe.join('|') + ')', 'gi') : null;
}

// HTML-escape `text`, wrapping any term match in <mark>. Safe against entity corruption.
function highlight(text, re){
  if(!re) return esc(text);
  re.lastIndex = 0;
  let out = '', last = 0, m;
  while((m = re.exec(text))){
    out += esc(text.slice(last, m.index)) + '<mark>' + esc(m[0]) + '</mark>';
    last = m.index + m[0].length;
    if(m.index === re.lastIndex) re.lastIndex++;
  }
  return out + esc(text.slice(last));
}

/* ───────────── render ───────────── */
function card(e, idx, re, snip){
  const no   = String(total - idx).padStart(2, '0');
  const date = e.date ? `<span class="ep-date num">${esc(e.date)}</span>` : '';
  const snp  = snip ? `<p class="ep-snip">…${snip}…</p>` : '';
  return `<a class="ep rev" href="${e.file}">
    <div class="ep-no">${no}</div>
    <div class="ep-main">
      <div class="ep-meta"><span class="ep-src">${highlight(e.src, re)}</span>${date}</div>
      <h3 class="ep-title">${highlight(e.title, re)}</h3>
      <p class="ep-dek">${highlight(e.dek, re)}</p>
      ${snp}
      <div class="ep-people">${highlight(e.people, re)}</div>
    </div>
  </a>`;
}

function render(docs, re, instant){
  listEl.innerHTML = docs.map(d => card(d.e, d.idx, re, d.snip)).join('');
  if(instant) listEl.querySelectorAll('.ep').forEach(c => c.classList.add('in'));
}

/* ───────────── full-text index (lazy, prebuilt) ───────────── */
async function loadFullText(){
  if(fullText) return fullText;
  if(loadingPromise) return loadingPromise;
  statusEl.textContent = '正在載入內文索引…';
  loadingPromise = fetch('search-index.json')
    .then(r => r.json())
    .then(arr => {
      fullText = Object.fromEntries(arr.map(d => [d.file, d.text || '']));
      statusEl.textContent = '';
      return fullText;
    })
    .catch(() => { statusEl.textContent = '內文索引載入失敗'; fullText = {}; return fullText; });
  return loadingPromise;
}

/* ───────────── search ───────────── */
async function runSearch(){
  const q = qEl.value.trim();
  if(!q){
    listLabel.style.display = '';
    countEl.textContent = String(total).padStart(2, '0') + ' 篇';
    statusEl.textContent = fullText ? '' : statusEl.textContent;
    render(allDocs, null, true);
    return;
  }
  listLabel.style.display = 'none';
  const ft    = await loadFullText();
  const terms = q.toLowerCase().split(/\s+/).filter(Boolean);
  const re    = makeRe(terms);
  const hits  = [];

  episodes.forEach((e, idx) => {
    const body  = ft[e.file] || '';
    const metaL = [e.title, e.dek, e.people, e.src].join(' ').toLowerCase();
    const bodyL = body.toLowerCase();
    if(!terms.every(t => metaL.includes(t) || bodyL.includes(t))) return;

    let score = 0;
    terms.forEach(t => {
      if(e.title.toLowerCase().includes(t)) score += 100;
      score += (metaL.split(t).length - 1) * 6;
      score += (bodyL.split(t).length - 1);
    });

    // snippet around the earliest body match
    let pos = -1;
    for(const t of terms){ const p = bodyL.indexOf(t); if(p >= 0 && (pos < 0 || p < pos)) pos = p; }
    const snip = pos >= 0
      ? highlight(body.slice(Math.max(0, pos - 42), Math.min(body.length, pos + 90)), re)
      : '';

    hits.push({ e, idx, score, snip });
  });

  hits.sort((a, b) => b.score - a.score);
  countEl.textContent = String(hits.length).padStart(2, '0') + ' 筆結果';
  if(!hits.length){
    listEl.innerHTML = `<div class="empty">沒有符合「${esc(q)}」的筆記。</div>`;
    return;
  }
  render(hits, re, true);
}

/* ───────────── reveal observer ───────────── */
const io = new IntersectionObserver((es) => {
  es.forEach(e => { if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } });
}, { threshold:.14 });

/* nav bg on scroll */
const navEl = document.getElementById('nav');
addEventListener('scroll', () => navEl.classList.toggle('scrolled', scrollY > 40), { passive: true });

/* theme toggle (initial theme is set by the inline <head> script to avoid FOUC) */
const root = document.documentElement;
document.getElementById('theme-toggle').addEventListener('click', () => {
  const next = root.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  root.setAttribute('data-theme', next);
  try{ localStorage.setItem('theme', next); }catch(e){}
});
// follow the OS setting only while the user hasn't made an explicit choice
matchMedia('(prefers-color-scheme: light)').addEventListener('change', (e) => {
  try{ if(localStorage.getItem('theme')) return; }catch(_){}
  root.setAttribute('data-theme', e.matches ? 'light' : 'dark');
});

/* collapsible search: icon → rounded field on click */
const navSearch = document.getElementById('navSearch');
const searchToggle = document.getElementById('search-toggle');
function openSearch(){
  navSearch.classList.add('open');
  navEl.classList.add('searching');
  searchToggle.setAttribute('aria-expanded', 'true');
  qEl.focus();
}
function closeSearch(){
  navSearch.classList.remove('open');
  navEl.classList.remove('searching');
  searchToggle.setAttribute('aria-expanded', 'false');
  if(qEl.value){ qEl.value = ''; runSearch(); }   // reset the list if a query was active
  qEl.blur();
}
searchToggle.addEventListener('click', (e) => {
  e.stopPropagation();
  if(!navSearch.classList.contains('open')) openSearch();
  else if(qEl.value) qEl.focus();                 // keep an active search open
  else closeSearch();
});
qEl.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeSearch(); });
document.addEventListener('click', (e) => {       // click outside an empty field closes it
  if(navSearch.classList.contains('open') && !navSearch.contains(e.target) && !qEl.value) closeSearch();
});

/* ───────────── init ───────────── */
(async function init(){
  try{
    episodes = await fetch('notes.json').then(r => r.json());
  }catch(_){
    listEl.innerHTML = '<div class="empty">無法載入筆記清單。請透過 HTTP 開啟（GitHub Pages 或本機伺服器），勿用 file:// 直接開檔。</div>';
    return;
  }
  total   = episodes.length;
  allDocs = episodes.map((e, idx) => ({ e, idx }));

  render(allDocs, null, false);
  countEl.textContent = String(total).padStart(2, '0') + ' 篇';
  document.querySelectorAll('.rev').forEach(el => io.observe(el));

  qEl.addEventListener('focus', loadFullText, { once: true });
  let timer;
  qEl.addEventListener('input', () => { clearTimeout(timer); timer = setTimeout(runSearch, 120); });
})();
</script>
</body>
</html>
